---
- name: Install Nginx on Debian family
  apt:
    name: nginx
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install Nginx on RedHat family
  yum:
    name: nginx
    state: present
  when: ansible_os_family == "RedHat"

- name: Deploy Nginx reverse proxy config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/conf.d/infra-monitor.conf
    mode: "0644"
  notify: restart nginx

- name: Ensure Nginx is running
  service:
    name: nginx
    state: started
    enabled: true
