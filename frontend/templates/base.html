<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AWS Infrastructure Monitor{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="top-nav">
        <a class="brand" href="{{ url_for('auth.home') }}">AWS Infrastructure Monitor</a>
        <div class="actions">
            {% if current_user.is_authenticated %}
            <form method="post" action="{{ url_for('auth.logout') }}">
                <button class="btn" type="submit">Logout</button>
            </form>
            {% else %}
            <a class="btn" href="{{ url_for('auth.login_page') }}">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
