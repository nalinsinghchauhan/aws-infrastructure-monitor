services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: infra_monitor
      MYSQL_USER: infra_user
      MYSQL_PASSWORD: infra_pass
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - backend/.env
    environment:
      AWS_SDK_LOAD_CONFIG: "1"
    ports:
      - "5001:5001"
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
    depends_on:
      db:
        condition: service_healthy
